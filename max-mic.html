<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Max">
<meta name="theme-color" content="#0a0f1e">
<title>Max - PulsAIO</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#0a0f1e;color:#f0f4f8;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:40px 16px}
.logo{display:flex;align-items:center;gap:10px}
.li{width:36px;height:36px;background:#1e40af;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;color:white}
.lt{font-weight:800;font-size:22px}
.tag{font-size:11px;color:rgba(255,255,255,0.4);letter-spacing:0.12em;text-transform:uppercase}
.mw{position:relative;display:flex;align-items:center;justify-content:center;width:240px;height:240px}
.pulse{position:absolute;width:100%;height:100%;border-radius:50%;border:2px solid #1e40af;opacity:0.3;pointer-events:none}
.listening .pulse{animation:p 1.2s ease-in-out infinite}
@keyframes p{0%,100%{transform:scale(1);opacity:0.3}50%{transform:scale(1.12);opacity:0.6}}
.mb{width:170px;height:170px;border-radius:50%;background:linear-gradient(135deg,#1e40af,#3b82f6);border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:white;-webkit-tap-highlight-color:transparent;touch-action:manipulation;user-select:none}
.mb.listening{background:linear-gradient(135deg,#991b1b,#ef4444)}
.mi{font-size:40px}
.ml{font-size:10px;font-weight:700;letter-spacing:1.5px}
.btns{display:flex;gap:10px;justify-content:center}
.btn{background:transparent;border:2px solid rgba(255,255,255,0.2);border-radius:50px;padding:10px 20px;font-size:11px;font-weight:700;color:rgba(255,255,255,0.6);cursor:pointer;letter-spacing:1px;-webkit-tap-highlight-color:transparent;touch-action:manipulation;user-select:none;font-family:inherit}
.btn.red{border-color:#ef4444;color:#ef4444;background:rgba(239,68,68,0.12)}
.st{font-size:13px;color:rgba(255,255,255,0.5);min-height:20px;text-align:center}
.rb{background:rgba(255,255,255,0.07);border-radius:16px;padding:16px;max-width:340px;width:100%;display:none}
.rb.on{display:block}
.rl{font-size:10px;font-weight:700;letter-spacing:1.5px;color:#3b82f6;margin-bottom:8px}
.rt{font-size:14px;line-height:1.6;color:#e2e8f0}
.ir{display:flex;gap:8px;max-width:340px;width:100%}
input{flex:1;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:12px;padding:12px;font-size:14px;color:white;font-family:inherit;-webkit-appearance:none}
input::placeholder{color:rgba(255,255,255,0.3)}
.sb{background:#1e40af;border:none;border-radius:12px;padding:12px 14px;color:white;cursor:pointer;font-size:16px;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.foot{font-size:12px;color:rgba(255,255,255,0.3)}
.foot a{color:#3b82f6;text-decoration:none}
</style>
</head>
<body>
<div class="logo"><div class="li">M</div><div class="lt">Max</div></div>
<div class="tag">PULSAIO ASSISTANT</div>
<div class="mw" id="mw"><div class="pulse"></div>
<button class="mb" id="mb" onclick="toggleMic()"><span class="mi">&#127897;</span><span class="ml" id="ml">TAP TO TALK</span></button></div>
<div class="btns"><button class="btn red" onclick="stopSpeaking()">Stop Audio</button><button class="btn" id="cb" onclick="toggleChat()">Chat Mode</button></div>
<div class="st" id="st">Tap to speak to Max</div>
<div class="rb" id="rb"><div class="rl">MAX</div><div class="rt" id="rt"></div></div>
<div class="ir"><input type="text" id="ti" placeholder="Or type a message..." autocomplete="off" autocorrect="off"><button class="sb" onclick="send()">&#10148;</button></div>
<div class="foot"><a href="/command-center.html">Full Dashboard</a></div>
<script>
var L=false,P=false,C=false,T=null,R=null,A=null,S=false,X=null;
var VID="pNInz6obpgDQGcFmaJgB";
var CTX="You are Max, Bill Hickner's AI assistant. Bill runs PulsAIO (wholesale AIO platform), Unity Controls, and UTBSC TAB. Key team: Ron Snider (CEO), Nate Essin (Shop Supervisor). Be concise, direct, entrepreneurial. Keep voice responses under 3 sentences.\n\nWhen the user asks you to add a calendar event, include CREATE_EVENT:{\"title\":\"event name\",\"date\":\"YYYY-MM-DD\",\"time\":\"HH:MM\",\"category\":\"general\",\"location\":\"\",\"notes\":\"\"} at the end of your response.\nWhen the user asks to be reminded of something, include SCHEDULE_REMINDER:{\"message\":\"text\",\"dueDate\":\"ISO8601\"} at the end.\nWhen the user wants to add a note to a PROJECT, include PROJECT_NOTE:{\"project\":\"project name\",\"note\":\"the note text\"} at the end.\nWhen the user wants to add a note to a PILOT, include PILOT_NOTE:{\"pilot\":\"pilot name\",\"note\":\"the note text\"} at the end.\nAlways calculate dates from the current time.";
var H=[];

var AU=null, SP=false, AUDIO_EL=null;

function ss(t){var el=document.getElementById('st');if(el)el.textContent=t;}
function sr(t){var el=document.getElementById('rt');if(el)el.textContent=t;var rb=document.getElementById('rb');if(rb)rb.style.display=t?'block':'none';}


function ua(){
  if(AU&&AU.state==='running')return;
  try{
    var ctx=new (window.AudioContext||window.webkitAudioContext)();
    if(ctx.state==='suspended')ctx.resume();
    var buf=ctx.createBuffer(1,1,22050);
    var src=ctx.createBufferSource();
    src.buffer=buf;src.connect(ctx.destination);
    if(src.start)src.start(0);else if(src.noteOn)src.noteOn(0);
    AU=ctx;
  }catch(e){console.log('AudioContext error:',e);}
  if(!AUDIO_EL){
    AUDIO_EL=new Audio();
    AUDIO_EL.setAttribute('playsinline','');
    AUDIO_EL.src='data:audio/mp3;base64,SUQzBAAAAAAAI1RTU0UAAAAPAAADTGF2ZjU4Ljc2LjEwMAAAAAAAAAAAAAAA//tQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAWGluZwAAAA8AAAACAAABhgC7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7//////////////////////////////////////////////////////////////////8AAAAATGF2YzU4LjEzAAAAAAAAAAAAAAAAJAAAAAAAAAAAAYYNAAAAAAAAAAAAAAAAAAAA//tQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAWGluZwAAAA8AAAACAAABhgC7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7//////////////////////////////////////////////////////////////////8AAAAATGF2YzU4LjEzAAAAAAAAAAAAAAAAJAAAAAAAAAAAAYYNAAAAAAAAAAAAAAAAAAAA';
    AUDIO_EL.load();
    AUDIO_EL.play().then(function(){AUDIO_EL.pause();}).catch(function(){});
  }
}

async function speakReply(text){
  if(SP)stopSpeaking();
  SP=true;
  ss('Speaking...');
  try{
    var r=await fetch('/.netlify/functions/tts',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:text,voiceId:'pNInz6obpgDQGcFmaJgB',model_id:'eleven_turbo_v2',voice_settings:{stability:0.5,similarity_boost:0.75,style:0.3,use_speaker_boost:true}})});
    if(!r.ok)throw new Error('TTS '+r.status);
    var blob=await r.blob();
    var url=URL.createObjectURL(blob);
    if(AUDIO_EL){
      AUDIO_EL.src=url;
      AUDIO_EL.onended=function(){SP=false;URL.revokeObjectURL(url);ss('Tap to speak again');};
      AUDIO_EL.onerror=function(){SP=false;URL.revokeObjectURL(url);fallbackSpeak(text);};
      AUDIO_EL.play().catch(function(e){
        console.log('Audio play failed:',e);
        SP=false;URL.revokeObjectURL(url);
        fallbackSpeak(text);
      });
    } else {
      var audio=new Audio(url);
      audio.onended=function(){SP=false;URL.revokeObjectURL(url);ss('Tap to speak again');};
      audio.onerror=function(){SP=false;fallbackSpeak(text);};
      audio.play().catch(function(){fallbackSpeak(text);});
    }
  }catch(e){
    console.log('TTS error:',e);
    SP=false;
    fallbackSpeak(text);
  }
}

function fallbackSpeak(text){
  try{
    window.speechSynthesis.cancel();
    var utt=new SpeechSynthesisUtterance(text);
    utt.rate=1.05;
    utt.onend=function(){SP=false;ss('Tap to speak again');};
    utt.onerror=function(){SP=false;};
    window.speechSynthesis.speak(utt);
    ss('Speaking (browser voice)...');
  }catch(e){SP=false;ss('Audio unavailable');}
}

function stopSpeaking(){
  if(AUDIO_EL){try{AUDIO_EL.pause();AUDIO_EL.currentTime=0;}catch(e){}}
  try{window.speechSynthesis.cancel();}catch(e){}
  SP=false;
  ss('Stopped');
}

function getCalendarContext() {
  try {
    var evts = JSON.parse(localStorage.getItem('cal:myevents') || '[]');
    if (!evts.length) return '';
    var upcoming = evts.sort(function(a,b){return new Date(a.date)-new Date(b.date);}).slice(0,10);
    return '\nUpcoming events: ' + upcoming.map(function(e){return e.title+' ('+e.date+(e.time?' '+e.time:'')+')';}).join(', ');
  } catch(e) { return ''; }
}

function getProjectsContext() {
  try {
    var p = JSON.parse(localStorage.getItem('pulsaio_projects') || '[]');
    if (!p.length) return '';
    return '\nProjects: ' + p.map(function(x){return x.name+' ['+x.status+']'+(x.goal?' - '+x.goal:'');}).join('; ');
  } catch(e) { return ''; }
}

function getPilotsContext() {
  try {
    var p = JSON.parse(localStorage.getItem('pac:pilots') || '[]');
    if (!p.length) return '';
    return '\nPilot stores: ' + p.map(function(x){return x.name+' ('+x.store+') ['+x.status+' '+x.progress+'%]'+(x.goal?' - '+x.goal:'');}).join('; ');
  } catch(e) { return ''; }
}

function getRemindersContext() {
  try {
    var r = JSON.parse(localStorage.getItem('pulsaio_reminders') || '[]');
    var active = r.filter(function(x){return !x.done;});
    if (!active.length) return '';
    return '\nActive reminders: ' + active.map(function(x){return x.text+(x.date?' (due: '+x.date+')':'');}).join('; ');
  } catch(e) { return ''; }
}

function handleMaxTags(reply) {
  // CREATE_EVENT
  var evtMatch = reply.match(/CREATE_EVENT:(\{[^}]+\})/);
  if (evtMatch) {
    try {
      var ev = JSON.parse(evtMatch[1]);
      var newEvt = {id:'p'+Date.now(), title:ev.title||'New Event', date:ev.date||new Date().toISOString().split('T')[0], time:ev.time||'', category:ev.category||'general', location:ev.location||'', notes:ev.notes||'', source:'personal'};
      var events = JSON.parse(localStorage.getItem('cal:myevents') || '[]');
      events.push(newEvt);
      localStorage.setItem('cal:myevents', JSON.stringify(events));
      fetch('/.netlify/functions/get-events',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({events:[newEvt]})}).catch(function(){});
      ss('Event added: ' + newEvt.title + ' on ' + newEvt.date);
    } catch(e) { console.log('CREATE_EVENT error:', e); }
  }
  // SCHEDULE_REMINDER
  var schedMatch = reply.match(/SCHEDULE_REMINDER:(\{[^}]+\})/);
  if (schedMatch) {
    try {
      var sched = JSON.parse(schedMatch[1]);
      var delay = Math.max(0, new Date(sched.dueDate).getTime() - Date.now());
      setTimeout(function() {
        fetch('/.netlify/functions/notify',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title:'Max Reminder',message:sched.message,priority:5,topic:'pulsaio-max-bill'})}).catch(function(){});
      }, delay);
    } catch(e) { console.log('SCHEDULE_REMINDER error:', e); }
  }
  // PROJECT_NOTE
  var projMatch = reply.match(/PROJECT_NOTE:(\{[^}]+\})/);
  if (projMatch) {
    try {
      var nd = JSON.parse(projMatch[1]);
      var projs = JSON.parse(localStorage.getItem('pulsaio_projects') || '[]');
      var pidx = projs.findIndex(function(pr){return pr.name && pr.name.toLowerCase().includes((nd.project||'').toLowerCase().trim());});
      if (pidx >= 0) {
        var ts = new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'});
        if (!projs[pidx].updates) projs[pidx].updates = [];
        projs[pidx].updates.unshift({date:ts, text:'Max: '+(nd.note||'').trim()});
        projs[pidx].updated = new Date().toISOString();
        localStorage.setItem('pulsaio_projects', JSON.stringify(projs));
        ss('Note added to ' + projs[pidx].name);
      } else { ss('Project not found: ' + nd.project); }
    } catch(e) { console.log('PROJECT_NOTE error:', e); }
  }
  // PILOT_NOTE
  var pilotMatch = reply.match(/PILOT_NOTE:(\{[^}]+\})/);
  if (pilotMatch) {
    try {
      var pn = JSON.parse(pilotMatch[1]);
      var pilots = JSON.parse(localStorage.getItem('pac:pilots') || '[]');
      var pidx2 = pilots.findIndex(function(x){return x.name && x.name.toLowerCase().includes((pn.pilot||'').toLowerCase().trim());});
      if (pidx2 >= 0) {
        var ts2 = new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'});
        if (!pilots[pidx2].updates) pilots[pidx2].updates = [];
        pilots[pidx2].updates.unshift({date:ts2, text:'Max: '+(pn.note||'').trim()});
        localStorage.setItem('pac:pilots', JSON.stringify(pilots));
        ss('Note added to ' + pilots[pidx2].name);
      } else { ss('Pilot not found: ' + pn.pilot); }
    } catch(e) { console.log('PILOT_NOTE error:', e); }
  }
  // Clean tags from reply
  return reply.replace(/CREATE_EVENT:\{[^}]+\}/g,'').replace(/SCHEDULE_REMINDER:\{[^}]+\}/g,'').replace(/PROJECT_NOTE:\{[^}]+\}/g,'').replace(/PILOT_NOTE:\{[^}]+\}/g,'').trim();
}

async function askMax(q){
ss("Max is thinking...");
var sys = CTX + getCalendarContext() + getProjectsContext() + getPilotsContext() + getRemindersContext() + '\nCURRENT TIME: ' + new Date().toISOString() + ' (local: ' + new Date().toLocaleString() + ')';
H.push({role:"user",content:q});
try{
var r=await fetch("/.netlify/functions/claude",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:500,system:sys,messages:H})});
var d=await r.json();
var reply=d.content?d.content.map(function(b){return b.text||"";}).join(""):"Sorry, try again.";
H.push({role:"assistant",content:reply});
var cleanReply = handleMaxTags(reply);
sr(cleanReply);
if(!P)speakReply(cleanReply);
}catch(e){sr("Connection error. Try again.");}
}

function send(){ua();ua();var v=document.getElementById("ti").value.trim();if(!v)return;document.getElementById("ti").value="";askMax(v);}
function startL(){
var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
if(!SR){ss("Voice requires Safari");return;}if(L)return;
var r=new SR();r.continuous=false;r.interimResults=true;r.lang="en-US";
r.onstart=function(){L=true;document.getElementById("mb").classList.add("listening");document.getElementById("mw").classList.add("listening");document.getElementById("ml").textContent="LISTENING...";ss("Listening...");};
r.onresult=function(e){document.getElementById("ti").value=Array.from(e.results).map(function(x){return x[0].transcript;}).join("");};
r.onend=function(){L=false;document.getElementById("mb").classList.remove("listening");document.getElementById("mw").classList.remove("listening");document.getElementById("ml").textContent="TAP TO TALK";var v=document.getElementById("ti").value.trim();if(v&&!P){document.getElementById("ti").value="";askMax(v);}else if(!v){ss("Tap to speak");}};
r.onerror=function(e){L=false;document.getElementById("mb").classList.remove("listening");document.getElementById("mw").classList.remove("listening");document.getElementById("ml").textContent="TAP TO TALK";if(e.error!=="aborted")ss("Mic error: "+e.error);};
R=r;try{r.start();}catch(e){ss("Mic error: "+e.message);}}
function stopL(){if(R){try{R.abort();}catch(e){}R=null;}L=false;document.getElementById("mb").classList.remove("listening");document.getElementById("mw").classList.remove("listening");document.getElementById("ml").textContent="TAP TO TALK";}
function toggleMic(){ua();if(L)stopL();else startL();}
function endChat(){C=false;if(T){clearTimeout(T);T=null;}P=false;stopL();stopSpeaking();var b=document.getElementById("cb");if(b){b.textContent="Chat Mode";b.className="btn";}sr("Chat mode off.");}
function toggleChat(){if(C){endChat();return;}C=true;var b=document.getElementById("cb");if(b){b.textContent="END CHAT";b.className="btn red";}sr("Chat mode on. Say end chat to stop.");ua();startL();}
document.getElementById("ti").addEventListener("keydown",function(e){if(e.key==="Enter")send();});
</script>
</body>
</html>
